<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Poster</title>
  <link rel="stylesheet" href="/api/fonts.css">
  <style>
    :root {
      --color-primary: #111827;
      --color-primary-light: #F9FAFB;
      --color-secondary: #4B5563;
      --color-accent: #DC2626;
      --color-surface: #FFFFFF;
      --color-surface-alt: #F5F5F0;
      --color-surface-hover: #F3F4F6;
      --color-text-primary: #111827;
      --color-text-secondary: #6B7280;
      --color-text-disabled: #D1D5DB;
      --color-border: #E5E7EB;
      --color-border-focus: #111827;
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      --font-serif: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-body: var(--font-serif);
      --font-heading: var(--font-serif);
      --text-base: 1.2vw;
      --text-sm: 0.9vw;
      --text-xs: 0.75vw;
      --text-lg: 1.5vw;
      --text-xl: 2vw;
      --text-2xl: 2.5vw;
      --text-3xl: 5vw;
      --text-4xl: 8vw;
      --space-1: 0.25vw;
      --space-2: 0.5vw;
      --space-3: 1vw;
      --space-4: 1.5vw;
      --space-6: 2.5vw;
      --space-8: 4vw;
      --space-12: 6vw;
      --space-16: 8vw;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-sm: none;
      --shadow-md: none;
      --shadow-lg: none;
      --page-width: 800px;
      --poster-print-width: 800px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--color-surface);
      color: var(--color-text-primary);
      line-height: 1.5;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .hero-visual {
      background: linear-gradient(180deg, var(--color-primary) 0%, var(--color-surface) 50%);
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .hero-visual .decorative {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03) 0%, transparent 50%);
    }
    .hero-visual .hero-placeholder {
      position: relative;
      z-index: 1;
      font-family: var(--font-heading);
      font-size: var(--text-4xl);
      font-weight: 900;
      color: var(--color-surface);
      opacity: 0.2;
      letter-spacing: 0.1em;
    }

    .container {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: var(--space-8) var(--space-6);
    }

    .hero-content {
      text-align: center;
      margin-top: calc(var(--space-16) * -1);
      position: relative;
      z-index: 2;
    }
    .hero-content h1 {
      font-family: var(--font-heading);
      font-size: var(--text-3xl);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: var(--space-4);
      letter-spacing: -0.02em;
    }
    .hero-content .subtitle {
      font-family: var(--font-sans);
      font-size: var(--text-lg);
      color: var(--color-text-secondary);
      max-width: 500px;
      margin: 0 auto var(--space-8);
      line-height: 1.6;
    }
    .hero-content .accent-line {
      width: 80px;
      height: 4px;
      background: var(--color-accent);
      margin: 0 auto var(--space-8);
    }

    .details-section {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-6);
      margin-top: var(--space-8);
      padding-top: var(--space-8);
      border-top: 1px solid var(--color-border);
    }
    .details-section .detail-item h3 {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }
    .details-section .detail-item p {
      font-size: var(--text-lg);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="hero-visual">
    <div class="decorative"></div>
    <span class="hero-placeholder">EXHIBITION</span>
  </div>

  <main class="container">
    <div class="hero-content">
      <h1>Annual Design<br>Exhibition 2026</h1>
      <p class="subtitle">A celebration of contemporary visual art and typographic exploration. Featuring works from emerging artists worldwide.</p>
      <div class="accent-line"></div>
    </div>

    <div class="details-section">
      <div class="detail-item">
        <h3>Date</h3>
        <p>June 10&ndash;30, 2026</p>
      </div>
      <div class="detail-item">
        <h3>Location</h3>
        <p>Modern Art Gallery<br>Shanghai, China</p>
      </div>
      <div class="detail-item">
        <h3>Featuring</h3>
        <p>40+ International<br>Artists &amp; Designers</p>
      </div>
    </div>
  </main>
</body>
</html>
