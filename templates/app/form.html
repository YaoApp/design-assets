<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Form</title>
  <link rel="stylesheet" href="/api/fonts.css">
  <style>
    :root {
      --color-primary: #4F46E5;
      --color-primary-hover: #4338CA;
      --color-primary-light: #E0E7FF;
      --color-secondary: #0EA5E9;
      --color-accent: #F59E0B;
      --color-surface: #FFFFFF;
      --color-surface-alt: #F9FAFB;
      --color-surface-hover: #F3F4F6;
      --color-text-primary: #111827;
      --color-text-secondary: #6B7280;
      --color-text-disabled: #D1D5DB;
      --color-border: #E5E7EB;
      --color-border-focus: #4F46E5;
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      --font-serif: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-body: var(--font-sans);
      --font-heading: var(--font-sans);
      --text-base: 16px;
      --text-sm: 14px;
      --text-xs: 12px;
      --text-lg: 18px;
      --text-xl: 20px;
      --text-2xl: 24px;
      --text-3xl: 30px;
      --text-4xl: 36px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-16: 64px;
      --radius-sm: 4px;
      --radius-md: 12px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
      --page-width: 375px;
      --header-height: 44px;
      --touch-target: 44px;
      --tab-bar-height: 56px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--color-surface-alt);
      color: var(--color-text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 0 var(--space-4);
    }
    header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text-primary);
    }
    main { padding: var(--space-4) 0 calc(var(--tab-bar-height) + var(--space-4)); }

    .form-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }
    .form-section h1 {
      font-size: var(--text-xl);
      font-weight: 700;
      margin-bottom: var(--space-1);
    }
    .form-section .form-subtitle {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-6);
    }
    .form-group {
      margin-bottom: var(--space-4);
    }
    .form-group label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 500;
      margin-bottom: var(--space-2);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      min-height: var(--touch-target);
      padding: 0 var(--space-4);
      font-size: var(--text-base);
      font-family: var(--font-body);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text-primary);
      outline: none;
    }
    .form-group textarea {
      padding: var(--space-3) var(--space-4);
      min-height: calc(var(--touch-target) * 2);
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--color-border-focus);
    }
    .form-group .hint {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-top: var(--space-1);
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: var(--touch-target);
      padding: 0 var(--space-6);
      font-size: var(--text-base);
      font-weight: 600;
      border: none;
      border-radius: var(--radius-md);
      background: var(--color-primary);
      color: var(--color-surface);
    }
  </style>
</head>
<body>
  <header>
    <span class="title">New Entry</span>
  </header>
  <main class="container">
    <div class="form-section">
      <h1>Add New Item</h1>
      <p class="form-subtitle">Fill in the details to create a new entry.</p>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Item name">
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="">Select category</option>
          <option value="a">Category A</option>
          <option value="b">Category B</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Enter a short description"></textarea>
        <p class="hint">Briefly describe this item.</p>
      </div>

      <button type="submit" class="btn">Save</button>
    </div>
  </main>
  <nav class="tab-bar">
    <a href="#" class="tab">Home</a>
    <a href="#" class="tab">Browse</a>
    <a href="#" class="tab active">Add</a>
    <a href="#" class="tab">Profile</a>
  </nav>
</body>
</html>
