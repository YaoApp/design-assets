<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>List</title>
  <link rel="stylesheet" href="/api/fonts.css">
  <style>
    :root {
      --color-primary: #4F46E5;
      --color-primary-hover: #4338CA;
      --color-primary-light: #E0E7FF;
      --color-secondary: #0EA5E9;
      --color-accent: #F59E0B;
      --color-surface: #FFFFFF;
      --color-surface-alt: #F9FAFB;
      --color-surface-hover: #F3F4F6;
      --color-text-primary: #111827;
      --color-text-secondary: #6B7280;
      --color-text-disabled: #D1D5DB;
      --color-border: #E5E7EB;
      --color-border-focus: #4F46E5;
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      --font-serif: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-body: var(--font-sans);
      --font-heading: var(--font-sans);
      --text-base: 16px;
      --text-sm: 14px;
      --text-xs: 12px;
      --text-lg: 18px;
      --text-xl: 20px;
      --text-2xl: 24px;
      --text-3xl: 30px;
      --text-4xl: 36px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-16: 64px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
      --page-width: 375px;
      --header-height: 44px;
      --touch-target: 44px;
      --tab-bar-height: 56px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--color-surface-alt);
      color: var(--color-text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 0 var(--space-4);
    }
    header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text-primary);
    }
    main { padding: var(--space-4) 0 calc(var(--tab-bar-height) + var(--space-4)); }

    .search-bar {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      padding: 0 var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      min-height: var(--touch-target);
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: var(--text-sm);
      font-family: var(--font-body);
      color: var(--color-text-primary);
      background: transparent;
    }
    .search-bar input::placeholder {
      color: var(--color-text-disabled);
    }

    .list-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .list-section .list-header {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--color-surface-alt);
      border-bottom: 1px solid var(--color-border);
    }
    .list-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-border);
      min-height: calc(var(--touch-target) + var(--space-2));
      text-decoration: none;
      color: inherit;
    }
    .list-item:last-child {
      border-bottom: none;
    }
    .list-item .avatar {
      width: calc(var(--touch-target) - var(--space-2));
      height: calc(var(--touch-target) - var(--space-2));
      min-width: calc(var(--touch-target) - var(--space-2));
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--color-primary-light), var(--color-surface-hover));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-primary);
    }
    .list-item .item-content {
      flex: 1;
      min-width: 0;
    }
    .list-item .item-title {
      font-size: var(--text-base);
      font-weight: 500;
      line-height: 1.3;
    }
    .list-item .item-subtitle {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      line-height: 1.3;
    }
    .list-item .chevron {
      color: var(--color-text-disabled);
      font-size: var(--text-lg);
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--tab-bar-height);
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 10;
    }
    .tab-bar .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: var(--touch-target);
      min-width: var(--touch-target);
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      text-decoration: none;
      padding: var(--space-1);
    }
    .tab-bar .tab.active {
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <header>
    <span class="title">Items</span>
  </header>
  <main class="container">
    <div class="search-bar">
      <input type="search" placeholder="Search items...">
    </div>

    <div class="list-section">
      <div class="list-header">Recent</div>
      <a href="#" class="list-item">
        <div class="avatar">A</div>
        <div class="item-content">
          <div class="item-title">Item Alpha</div>
          <div class="item-subtitle">Last modified: 2 hours ago</div>
        </div>
        <span class="chevron">&rsaquo;</span>
      </a>
      <a href="#" class="list-item">
        <div class="avatar">B</div>
        <div class="item-content">
          <div class="item-title">Item Beta</div>
          <div class="item-subtitle">Last modified: Yesterday</div>
        </div>
        <span class="chevron">&rsaquo;</span>
      </a>
      <a href="#" class="list-item">
        <div class="avatar">C</div>
        <div class="item-content">
          <div class="item-title">Item Gamma</div>
          <div class="item-subtitle">Last modified: 3 days ago</div>
        </div>
        <span class="chevron">&rsaquo;</span>
      </a>
    </div>

    <div class="list-section" style="margin-top: var(--space-4);">
      <div class="list-header">Older</div>
      <a href="#" class="list-item">
        <div class="avatar">D</div>
        <div class="item-content">
          <div class="item-title">Item Delta</div>
          <div class="item-subtitle">Last modified: 1 week ago</div>
        </div>
        <span class="chevron">&rsaquo;</span>
      </a>
      <a href="#" class="list-item">
        <div class="avatar">E</div>
        <div class="item-content">
          <div class="item-title">Item Epsilon</div>
          <div class="item-subtitle">Last modified: 2 weeks ago</div>
        </div>
        <span class="chevron">&rsaquo;</span>
      </a>
    </div>
  </main>
  <nav class="tab-bar">
    <a href="#" class="tab">Home</a>
    <a href="#" class="tab">Browse</a>
    <a href="#" class="tab active">Items</a>
    <a href="#" class="tab">Profile</a>
  </nav>
</body>
</html>
