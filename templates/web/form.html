<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
  <link rel="stylesheet" href="/api/fonts.css">
  <style>
    :root {
      --color-primary: #4F46E5;
      --color-primary-hover: #4338CA;
      --color-primary-light: #E0E7FF;
      --color-secondary: #0EA5E9;
      --color-accent: #F59E0B;
      --color-surface: #FFFFFF;
      --color-surface-alt: #F9FAFB;
      --color-surface-hover: #F3F4F6;
      --color-text-primary: #111827;
      --color-text-secondary: #6B7280;
      --color-text-disabled: #D1D5DB;
      --color-border: #E5E7EB;
      --color-border-focus: #4F46E5;
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      --font-serif: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-body: var(--font-sans);
      --font-heading: var(--font-sans);
      --text-base: 16px;
      --text-sm: 14px;
      --text-xs: 12px;
      --text-lg: 18px;
      --text-xl: 20px;
      --text-2xl: 24px;
      --text-3xl: 30px;
      --text-4xl: 36px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-16: 64px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
      --page-width: 1200px;
      --header-height: 56px;
      --sidebar-width: 240px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--color-surface-alt);
      color: var(--color-text-primary);
      line-height: 1.6;
    }
    .container {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 0 var(--space-4);
    }
    header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      height: var(--header-height);
      display: flex;
      align-items: center;
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    header .logo {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--color-primary);
      text-decoration: none;
    }
    header nav a {
      color: var(--color-text-secondary);
      text-decoration: none;
      margin-left: var(--space-6);
      font-size: var(--text-sm);
    }
    header nav a:hover { color: var(--color-text-primary); }
    main { padding: var(--space-8) 0; display: flex; justify-content: center; }

    .form-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: var(--space-8);
      width: 100%;
      max-width: 480px;
    }
    .form-card h1 {
      font-size: var(--text-2xl);
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .form-card .form-subtitle {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-8);
    }
    .form-group {
      margin-bottom: var(--space-4);
    }
    .form-group label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 500;
      margin-bottom: var(--space-2);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-base);
      font-family: var(--font-body);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text-primary);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }
    .form-group .hint {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-top: var(--space-1);
    }
    .form-group .error {
      font-size: var(--text-xs);
      color: var(--color-error);
      margin-top: var(--space-1);
    }
    .form-actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-8);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-3) var(--space-6);
      font-size: var(--text-base);
      font-weight: 500;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-surface);
      flex: 1;
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
    }
    .btn-secondary {
      background: var(--color-surface);
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover {
      background: var(--color-surface-hover);
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">Project Name</a>
      <nav>
        <a href="#">Form</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="form-card">
      <h1>Create New Item</h1>
      <p class="form-subtitle">Fill in the details below to add a new entry.</p>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter item name">
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="">Select a category</option>
          <option value="a">Category A</option>
          <option value="b">Category B</option>
          <option value="c">Category C</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" rows="4" placeholder="Enter a short description"></textarea>
        <p class="hint">Briefly describe this item in a few sentences.</p>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </div>
  </main>
</body>
</html>
