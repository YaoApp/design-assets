<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data List</title>
  <link rel="stylesheet" href="/api/fonts.css">
  <style>
    :root {
      --color-primary: #4F46E5;
      --color-primary-hover: #4338CA;
      --color-primary-light: #E0E7FF;
      --color-secondary: #0EA5E9;
      --color-accent: #F59E0B;
      --color-surface: #FFFFFF;
      --color-surface-alt: #F9FAFB;
      --color-surface-hover: #F3F4F6;
      --color-text-primary: #111827;
      --color-text-secondary: #6B7280;
      --color-text-disabled: #D1D5DB;
      --color-border: #E5E7EB;
      --color-border-focus: #4F46E5;
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      --font-serif: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-body: var(--font-sans);
      --font-heading: var(--font-sans);
      --text-base: 16px;
      --text-sm: 14px;
      --text-xs: 12px;
      --text-lg: 18px;
      --text-xl: 20px;
      --text-2xl: 24px;
      --text-3xl: 30px;
      --text-4xl: 36px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-16: 64px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
      --page-width: 1200px;
      --header-height: 56px;
      --sidebar-width: 240px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--color-surface-alt);
      color: var(--color-text-primary);
      line-height: 1.6;
    }
    .container {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 0 var(--space-4);
    }
    header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      height: var(--header-height);
      display: flex;
      align-items: center;
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    header .logo {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--color-primary);
      text-decoration: none;
    }
    header nav a {
      color: var(--color-text-secondary);
      text-decoration: none;
      margin-left: var(--space-6);
      font-size: var(--text-sm);
    }
    header nav a:hover { color: var(--color-text-primary); }
    main { padding: var(--space-8) 0; }

    .page-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .page-toolbar h1 {
      font-size: var(--text-2xl);
      font-weight: 700;
    }
    .page-toolbar .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--color-primary);
      color: var(--color-surface);
      padding: var(--space-2) var(--space-4);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }
    .page-toolbar .btn:hover {
      background: var(--color-primary-hover);
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: var(--text-sm);
      font-family: var(--font-body);
      color: var(--color-text-primary);
      background: transparent;
    }
    .search-bar input::placeholder {
      color: var(--color-text-disabled);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .table thead th {
      text-align: left;
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
      border-bottom: 1px solid var(--color-border);
    }
    .table tbody td {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      border-bottom: 1px solid var(--color-border);
    }
    .table tbody tr:hover td {
      background: var(--color-surface-hover);
    }
    .table tbody tr:last-child td {
      border-bottom: none;
    }
    .badge {
      display: inline-block;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
    }
    .badge-success { background: #D1FAE5; color: #065F46; }
    .badge-warning { background: #FEF3C7; color: #92400E; }
    .badge-error   { background: #FEE2E2; color: #991B1B; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">Project Name</a>
      <nav>
        <a href="#">List</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <div class="page-toolbar">
      <h1>Items</h1>
      <a href="#" class="btn">+ Add Item</a>
    </div>

    <div class="search-bar">
      <input type="search" placeholder="Search items...">
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Item Alpha</td>
          <td>Category A</td>
          <td><span class="badge badge-success">Active</span></td>
          <td>2026-06-09</td>
        </tr>
        <tr>
          <td>Item Beta</td>
          <td>Category B</td>
          <td><span class="badge badge-warning">Pending</span></td>
          <td>2026-06-08</td>
        </tr>
        <tr>
          <td>Item Gamma</td>
          <td>Category A</td>
          <td><span class="badge badge-error">Inactive</span></td>
          <td>2026-06-05</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
