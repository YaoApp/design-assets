# ============================================================
# Color Palette Standard Format v1.0
# YaoApp/design-assets
# ============================================================
palette:
  name: "Noir"
  version: "1.0"
  source: "curated"
  source_url: null

  tags:
    industry: "media"
    style: "noir"
    mode: "dark"
    season: null
    culture: null

  colors:
    primary:
      base: "#E8E8E8"
      hover: "#D0D0D0"
      light: "#F5F5F5"

    secondary:
      base: "#3A3A3A"
      hover: "#2E2E2E"
      light: "#555555"

    accent:
      base: "#8B0000"
      hover: "#6B0000"
      light: "#B22222"

    surface:
      base: "#121212"
      alt: "#1E1E1E"
      hover: "#2A2A2A"

    text:
      primary: "#E8E8E8"
      secondary: "#888888"
      disabled: "#555555"
      inverse: "#121212"

    border:
      base: "#333333"
      focus: "#E8E8E8"

    semantic:
      success: "#10B981"
      warning: "#F59E0B"
      error: "#EF4444"
      info: "#3B82F6"

  dark_mode:
    surface:
      base: "#121212"
      alt: "#1E1E1E"
    text:
      primary: "#E8E8E8"
      secondary: "#888888"
