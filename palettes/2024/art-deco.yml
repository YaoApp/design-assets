# ============================================================
# Color Palette Standard Format v1.0
# YaoApp/design-assets
# ============================================================
palette:
  name: "Art Deco"
  version: "1.0"
  source: "curated"
  source_url: null

  tags:
    industry: "creative"
    style: "art-deco"
    mode: "light"
    season: null
    culture: null

  colors:
    primary:
      base: "#0B3D3A"
      hover: "#093230"
      light: "#3D6B68"

    secondary:
      base: "#D4A843"
      hover: "#C49A33"
      light: "#E0C06F"

    accent:
      base: "#C9A84C"
      hover: "#B8963C"
      light: "#D9BF73"

    surface:
      base: "#FBF7F0"
      alt: "#F5EDE0"
      hover: "#EDE3D2"

    text:
      primary: "#2D2D2D"
      secondary: "#7A7265"
      disabled: "#B0A898"
      inverse: "#FBF7F0"

    border:
      base: "#D9CEB8"
      focus: "#C9A84C"

    semantic:
      success: "#10B981"
      warning: "#F59E0B"
      error: "#EF4444"
      info: "#3B82F6"

  dark_mode:
    surface:
      base: "#0A1F1D"
      alt: "#0F2D2A"
    text:
      primary: "#F5EDE0"
      secondary: "#B0A898"
