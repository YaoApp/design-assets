# ============================================================
# Traditional Chinese Colors Database
# Based on historical Chinese color taxonomy (色名考)
# Reference: https://www.nevertoday.cn/
# Used by: color-palette skill — harmony lookup, traditional theme generation
# ============================================================
# Harmony rules:
#   - Complementary: colors from opposing families (red ↔ green, blue ↔ orange)
#   - Adjacent: neighboring colors in the same season
#   - Five Elements: 火(red) → 土(yellow) → 金(white) → 水(black) → 木(green)
# ============================================================

