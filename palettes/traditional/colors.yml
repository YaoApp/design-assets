# ============================================================
# Color Harmonies (配色关系)
# ============================================================
harmonies:
  # Five Elements generation cycle (相生): 木→火→土→金→水→木
  sheng_cycle:
    - from: "green"
      to: "red"
      relationship: "wood-feeds-fire"
    - from: "red"
      to: "yellow"
      relationship: "fire-creates-earth"
    - from: "yellow"
      to: "neutral"
      relationship: "earth-bears-metal"
    - from: "neutral"
      to: "blue"
      relationship: "metal-collects-water"
    - from: "blue"
      to: "green"
      relationship: "water-nourishes-wood"

  # Common traditional pairings
  pairings:
    - name: "月白·青莲"
      colors: ["#D6ECF0", "#8B6BAE"]
      style: "quiet_elegant"
      description: "Moon white with lotus purple — quiet elegance"

    - name: "胭脂·翡翠"
      colors: ["#9B1B30", "#4CAF50"]
      style: "bold_contrast"
      description: "Rouge red with jadeite green — bold traditional contrast"

    - name: "藤黄·靛青"
      colors: ["#F2D458", "#1E4785"]
      style: "imperial"
      description: "Rattan yellow with indigo — imperial palette"

    - name: "缃色·花青"
      colors: ["#F0C05A", "#3D5B8A"]
      style: "scholar"
      description: "Light yellow with flower blue — scholarly elegance"

    - name: "秋色·藏蓝"
      colors: ["#D9883B", "#2C3E6B"]
      style: "autumn_night"
      description: "Autumn orange with Tibetan blue — harvest night"

    - name: "青葱·黛紫"
      colors: ["#7AAF5A", "#4A2D5A"]
      style: "deep_forest"
      description: "Fresh green with dark purple — deep forest mystery"

    - name: "竹青·朱砂"
      colors: ["#789262", "#E83015"]
      style: "natural_vibrant"
      description: "Bamboo green with cinnabar red — nature meets fire"

    - name: "霜色·玄色"
      colors: ["#E8E0D5", "#0D0D0D"]
      style: "ink_wash"
      description: "Frost white with deep black — ink wash painting"

# ============================================================
# Seasonal Palettes
# ============================================================
seasonal:
  spring:
    name: "Spring Renewal"
    primary_family: "green"
    accent_family: "red"
    description: "Fresh greens with floral accents — 春回大地"
    colors: ["#A8D870", "#F47983", "#F5F0E8", "#3D5A2D"]

  summer:
    name: "Summer Vibrancy"
    primary_family: "red"
    accent_family: "cyan"
    description: "Bold reds with cooling blues — 盛夏光年"
    colors: ["#E83015", "#6BB5C8", "#FFF8F0", "#1A3A4A"]

  autumn:
    name: "Autumn Harvest"
    primary_family: "orange"
    accent_family: "purple"
    description: "Warm earth tones with deep purples — 秋收冬藏"
    colors: ["#D9883B", "#5C3D6B", "#F5EDE0", "#3D2A1A"]

  winter:
    name: "Winter Stillness"
    primary_family: "blue"
    accent_family: "neutral"
    description: "Deep blues with ink blacks — 寒江独钓"
    colors: ["#1E4785", "#E8E0D5", "#F5F0EB", "#0D0D0D"]
